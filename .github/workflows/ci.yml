name: CI

on:
  pull_request:
    paths:
      - "kubernetes/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
      - ".gitleaks.toml"
      - ".yamllint.yaml"
  push:
    branches: [main]
    paths:
      - "kubernetes/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pipx install yamllint
      - name: Lint
        run: yamllint -c .yamllint.yaml kubernetes

  validate:
    name: Render & schema-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          # Pin to Helm 3.x — Helm 4 breaks kustomize's `--enable-helm` integration.
          version: v3.18.6
      - name: Install kustomize + kubeconform
        run: |
          set -euo pipefail
          curl -sfL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin kustomize
          curl -sfL "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin kubeconform
      - name: Validate manifests
        run: ./scripts/validate-manifests.sh

  policy:
    name: Policy (kube-linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kube-linter
        run: |
          set -euo pipefail
          curl -sfL "https://github.com/stackrox/kube-linter/releases/download/v0.8.3/kube-linter-linux.tar.gz" \
            | sudo tar -xz -C /usr/local/bin kube-linter
      - name: Run kube-linter
        run: ./scripts/policy-check.sh
