<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ site_title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ site_description }}{% endblock %}">
  <meta name="author" content="{{ site_author }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <!-- Apply saved/system theme before paint to avoid a flash. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (!t) t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="brand">{{ site_title }}</a>
    <nav>
      <a href="/">home</a>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle light/dark theme"></button>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <span>© {{ site_author }}</span>
    <span>powered by Notion · FastAPI · k8s</span>
  </footer>
  <script>
    (function () {
      var btn = document.getElementById("theme-toggle");
      if (!btn) return;
      function render() {
        btn.textContent = document.documentElement.getAttribute("data-theme") === "light" ? "🌙" : "☀️";
      }
      render();
      btn.addEventListener("click", function () {
        var next = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", next);
        try { localStorage.setItem("theme", next); } catch (e) {}
        render();
      });
    })();
  </script>
</body>
</html>
