# SOPS configuration for encrypting application secrets committed to this repo.
# This is for *app* secrets (e.g. DB passwords) — NOT for repo auth (the repo is
# public, ArgoCD reads it without credentials).
#
# Encrypt a secret in place:   sops -e -i path/to/secret.sops.yaml
# Decrypt to view:             sops -d path/to/secret.sops.yaml
#
# Decryption inside the cluster (KSOPS / argocd-repo-server wiring) is a later
# task — see kubernetes/docs/gitops-structure.md.
creation_rules:
  - path_regex: .*\.sops\.ya?ml$
    encrypted_regex: ^(data|stringData)$
    age: age14y3vjfm4dfz6pr9fz7ndclpa24avmk9ewn3eadfh2fylmnenkp8qqygz4h
