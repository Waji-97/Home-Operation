apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # ServerSideApply structured-merge diff trips on k8s 1.35 Deployment status
    # fields (.status.terminatingReplicas) not in ArgoCD's bundled schema.
    # Server-Side Diff (API dry-run) avoids it. Same fix as longhorn.
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/Waji-97/Home-Operation
    targetRevision: main
    path: kubernetes/apps/tailscale-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # operator ships several CRDs
