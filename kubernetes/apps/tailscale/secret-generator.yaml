# KSOPS generator: decrypts secret.sops.yaml at render time (in argocd-repo-server).
# Requires the KSOPS exec plugin installed on repo-server and buildOptions
# `--enable-alpha-plugins --enable-exec` (see kubernetes/bootstrap/in-cluster).
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: tailscale-secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - ./secret.sops.yaml
