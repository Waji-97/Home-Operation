apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - configmap.yaml
  - deployment.yaml
  - redis.yaml
  - service.yaml
  - ingress.yaml

# blog-secrets (NOTION_TOKEN / NOTION_DATABASE_ID / NOTION_WEBHOOK_SECRET), decrypted by KSOPS.
generators:
  - ./secret-generator.yaml
