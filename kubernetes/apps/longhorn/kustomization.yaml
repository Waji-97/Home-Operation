apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Renders the upstream Longhorn Helm chart through Kustomize.
# Requires `kustomize.buildOptions: --enable-helm` on the argocd-cm ConfigMap
# (see kubernetes/bootstrap/in-cluster/argocd-cm-patch.yaml).
helmCharts:
  - name: longhorn
    repo: https://charts.longhorn.io
    version: 1.12.0
    releaseName: longhorn
    namespace: longhorn-system
    valuesFile: values.yaml
