# Merge patch for the argocd-cm ConfigMap.
# Apply with:
#   kubectl patch cm argocd-cm -n argocd --type=merge \
#     --patch-file kubernetes/bootstrap/in-cluster/argocd-cm-patch.yaml
#
# - kustomize.buildOptions:
#     --enable-helm          -> render Helm charts via `helmCharts:` (e.g. longhorn)
#     --enable-alpha-plugins
#     --enable-exec          -> run the KSOPS exec generator (decrypt SOPS secrets)
# - resource.customizations.health.argoproj.io_Application -> makes the
#   app-of-apps root report correct aggregated health for child Applications.
data:
  kustomize.buildOptions: --enable-helm --enable-alpha-plugins --enable-exec
  resource.customizations.health.argoproj.io_Application: |
    hs = {}
    hs.status = "Progressing"
    hs.message = ""
    if obj.status ~= nil then
      if obj.status.health ~= nil then
        hs.status = obj.status.health.status
        if obj.status.health.message ~= nil then
          hs.message = obj.status.health.message
        end
      end
    end
    return hs
